framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true
    php_errors:
        log: true
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
    annotations: false
    assets:
        # Bumpez ASSET_VERSION à chaque déploiement (ou via CI) pour invalider
        # le cache navigateur des CSS/JS. Fallback : hash du commit ou timestamp.
        version: '%env(default::ASSET_VERSION)%'
        version_format: '%%s?v=%%s'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
