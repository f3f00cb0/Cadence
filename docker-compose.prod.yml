# Production compose, consumed by Dokploy.
# Le `docker-compose.yml` (sans suffix) reste dédié au dev local — ne pas le mélanger.
#
# Image GHCR : ghcr.io/f3f00cb0/cadence — poussée par `.github/workflows/deploy.yml`.
# La var $IMAGE_TAG (défaut: latest) permet le rollback : il suffit de la fixer à
# `sha-XXXXXXX` dans l'env Dokploy pour repointer sur une image plus ancienne du GHCR.

services:
  database:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  php:
    image: ghcr.io/f3f00cb0/cadence:${IMAGE_TAG:-latest}
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=1
      STAS_GTFS_URL: ${STAS_GTFS_URL}
      VELIVERT_GBFS_URL: ${VELIVERT_GBFS_URL}
    depends_on:
      database:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    # Image custom : nginx + public/ baké en interne (pas de volume partagé).
    # Construite par .github/workflows/deploy.yml en parallèle de l'image php.
    image: ghcr.io/f3f00cb0/cadence-nginx:${IMAGE_TAG:-latest}
    depends_on:
      - php
    networks:
      - default            # pour parler à php sur le réseau interne du compose
      - dokploy-network    # pour être joignable par Traefik (réseau partagé Dokploy)
    restart: unless-stopped
    labels:
      # Dokploy ne génère PAS les labels Traefik pour les services type Compose.
      # On les déclare ici à la main. Le domaine vient de la var APP_DOMAIN
      # définie dans l'env Dokploy (ex: APP_DOMAIN=mobilite.exemple.fr).
      - traefik.enable=true
      - traefik.docker.network=dokploy-network

      # Router HTTPS (port 443, cert via Let's Encrypt)
      - traefik.http.routers.furan-secure.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.furan-secure.entrypoints=websecure
      - traefik.http.routers.furan-secure.tls=true
      - traefik.http.routers.furan-secure.tls.certresolver=letsencrypt

      # Router HTTP qui redirige vers HTTPS
      - traefik.http.routers.furan-insecure.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.furan-insecure.entrypoints=web
      - traefik.http.routers.furan-insecure.middlewares=redirect-to-https@docker

      # Cible : nginx écoute en HTTP sur 80 à l'intérieur du container
      - traefik.http.services.furan.loadbalancer.server.port=80

  worker:
    image: ghcr.io/f3f00cb0/cadence:${IMAGE_TAG:-latest}
    command:
      - php
      - bin/console
      - messenger:consume
      - scheduler_main
      - async
      - -vv
      - --time-limit=3600
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=1
      STAS_GTFS_URL: ${STAS_GTFS_URL}
      VELIVERT_GBFS_URL: ${VELIVERT_GBFS_URL}
    depends_on:
      database:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  migrations:
    image: ghcr.io/f3f00cb0/cadence:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      STAS_GTFS_URL: ${STAS_GTFS_URL}
      VELIVERT_GBFS_URL: ${VELIVERT_GBFS_URL}
    depends_on:
      database:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        bin/console doctrine:migrations:migrate -n --no-debug \
          && (bin/console app:gtfs:import || echo 'GTFS import failed, retry manually')

networks:
  default:
  dokploy-network:
    external: true

volumes:
  db_data:
