services:
  database:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: mobilite
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mobilite"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: ./docker/php
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://app:app@database:5432/mobilite?serverVersion=16&charset=utf8"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  worker:
    build:
      context: ./docker/php
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    command: ["php", "bin/console", "messenger:consume", "scheduler_main", "async", "-vv", "--time-limit=3600"]
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://app:app@database:5432/mobilite?serverVersion=16&charset=utf8"

volumes:
  db_data:
